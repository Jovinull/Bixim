; ==============================================================================
; Bixim - PlatformIO Configuration
; ==============================================================================
; Targets:
;   native    -> PC/Windows (debug & testing via Raylib)
;   esp32dev  -> ESP32 WROOM-32 (production hardware)
;
; Usage:
;   Build native:   pio run -e native
;   Run  native:    pio run -e native -t exec
;   Build ESP32:    pio run -e esp32dev
;   Upload ESP32:   pio run -e esp32dev -t upload
;   Serial monitor: pio device monitor
; ==============================================================================

[platformio]
; Default build target when no -e flag is provided
default_envs = native

; ---------------------------------------------------------------------------
; Shared flags applied to all environments via ${common.build_flags}
; ---------------------------------------------------------------------------
[common]
build_flags =
    -std=c++17
    -Wall
    -Wextra
    -Wpedantic

; ==============================================================================
; ENVIRONMENT: native  (PC / Windows)
; ==============================================================================
; Requires:
;   - MSYS2 with MinGW-w64 toolchain installed
;   - Raylib installed via: pacman -S mingw-w64-x86_64-raylib
;
; If your MSYS2 is installed in a different drive/path, adjust the
; -I and -L flags below accordingly.
; ==============================================================================
[env:native]
platform = native
build_type = debug
; Include src/hal/ so TimerPC.cpp and TimerESP32.cpp are both found,
; then the #ifdef guards inside each file ensure only the correct one compiles.
build_src_filter = +<*> -<.git/> -<.svn/>
build_flags =
    ${common.build_flags}
    -DPLATFORM_PC
    ; --- Project include path (for hal/ITimer.h, hal/TimerPC.h, etc.) ---
    -Iinclude
    ; --- Raylib include and library paths (MSYS2 MinGW64 default location) ---
    -IC:/msys64/mingw64/include
    -LC:/msys64/mingw64/lib
    ; --- Raylib and its Windows system dependencies ---
    -lraylib
    -lopengl32
    -lgdi32
    -lwinmm
    ; --- std::thread support (used by TimerPC::SleepMicroseconds) ---
    -lpthread
    ; --- Ensure console window does not open alongside the game window ---
    ; Uncomment the line below for release builds only:
    ; -mwindows

; ==============================================================================
; ENVIRONMENT: esp32dev  (ESP32 WROOM-32 / C3 - Production)
; ==============================================================================
; Board reference: https://docs.platformio.org/en/latest/boards/espressif32/
; Change `board` to `esp32-c3-devkitm-1` if using an ESP32-C3 variant.
; ==============================================================================
[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
build_flags =
    ${common.build_flags}
    -DPLATFORM_ESP32
    ; --- Project include path ---
    -Iinclude
    ; I2C pins for OLED (defaults: SDA=21, SCL=22 on WROOM-32)
    ; Override here if your wiring differs:
    ; -DSSD1306_SDA=21
    ; -DSSD1306_SCL=22
lib_deps =
    ; Adafruit OLED driver for SSD1306 controller
    adafruit/Adafruit SSD1306@^2.5.7
    ; Adafruit graphics primitives (required by SSD1306)
    adafruit/Adafruit GFX Library@^1.11.9
    ; I2C bus support (usually bundled with ESP32 Arduino core, listed for clarity)
    Wire
